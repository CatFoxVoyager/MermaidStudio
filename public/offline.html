<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - MermaidStudio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--surface-base, #fafaf9);
      color: var(--text-primary, #111827);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: var(--accent-dim, rgba(13,115,119,0.1));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg {
      width: 40px;
      height: 40px;
      color: var(--accent, #0d7377);
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-primary, #111827);
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-secondary, #6b7280);
      margin-bottom: 24px;
    }
    .features {
      text-align: left;
      background: var(--surface-raised, #ffffff);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      border: 1px solid var(--border-subtle, rgba(0,0,0,0.07));
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 14px;
      color: var(--text-secondary, #6b7280);
    }
    .feature:last-child { margin-bottom: 0; }
    .feature svg {
      width: 18px;
      height: 18px;
      color: var(--accent, #0d7377);
      flex-shrink: 0;
    }
    .retry-btn {
      background: var(--accent, #0d7377);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .retry-btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010-12.728m0 0l-2.828-2.828m2.828 2.828L21 21M15.536 8.464a5 5 0 010-7.072m0 0l-2.828-2.828m2.828 2.828L5.636 21M5.636 5.636a5 5 0 010 7.072m0 0l2.828 2.828m0-7.072l-2.828 2.828" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>MermaidStudio works offline! Your diagrams are saved locally.</p>

    <div class="features">
      <div class="feature">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>All diagrams are saved in browser storage</span>
      </div>
      <div class="feature">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
        </svg>
        <span>Local AI (Ollama, LM Studio) still works</span>
      </div>
      <div class="feature">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
        <span>Your work syncs when you reconnect</span>
      </div>
    </div>

    <button class="retry-btn" onclick="window.location.reload()">
      Try reconnecting
    </button>
  </div>
</body>
</html>
